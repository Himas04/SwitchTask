<!DOCTYPE html>
<html lang="en">
<head>
<!-- <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
<title>Bus Reservation System</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
}

.bus{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
}

.seat-container{
    display:grid;
    grid-template-columns:repeat(4,70px);
    gap:15px 25px;
    justify-content:center;
}

.seat{
    width:70px;
    height:70px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.available{
    background:#d4edda;
}

.selected{
    background:orange;
}

.booked{
    background:#dc3545;
    color:white;
    cursor:not-allowed;
}

.controls{
    margin-top:20px;
    text-align:center;
}

input{
    padding:10px;
    width:250px;
}

button.action{
    padding:10px 15px;
    margin:5px;
}

.summary{
    margin-top:20px;
    background:white;
    padding:15px;
    border-radius:10px;
}

.history{
    margin-top:20px;
    background:white;
    padding:15px;
    border-radius:10px;
}

</style>
</head>
<body>

<div class="container">

<h1>🚌 Bus Reservation System</h1>

<div class="bus">

<div class="seat-container" id="seatContainer"></div>

<div class="controls">

<input
type="text"
id="passengerName"
placeholder="Passenger Name">

<br><br>

<button class="action" onclick="bookSeats()">
Book Selected Seats
</button>

<button class="action" onclick="cancelBooking()">
Cancel Booking
</button>

</div>

</div>

<div class="summary">

<h3>Booking Summary</h3>

<p>Total Seats: 40</p>

<p id="availableCount"></p>

<p id="bookedCount"></p>

<p id="amount"></p>

</div>

<div class="history">

<h3>Booking History</h3>

<ul id="history"></ul>

</div>

</div>

<script>

const TOTAL_SEATS = 40;
const PRICE_PER_SEAT = 1500;

let seats = [];
let selectedSeats = [];
let bookingHistory = [];

const seatContainer =
document.getElementById("seatContainer");

for(let i=1;i<=TOTAL_SEATS;i++){

    seats.push({
        seatNo:i,
        status:"Available",
        passenger:""
    });

    const seatBtn =
    document.createElement("button");

    seatBtn.innerText = i;

    seatBtn.classList.add(
        "seat",
        "available"
    );

    seatBtn.dataset.seat = i;

    seatBtn.addEventListener(
        "click",
        function(){
            selectSeat(i);
        }
    );

    seatContainer.appendChild(seatBtn);
}

function selectSeat(seatNo){

    const seat =
    seats[seatNo-1];

    if(seat.status==="Booked"){
        alert("Seat already booked");
        return;
    }

    const btn =
    document.querySelector(
        `[data-seat="${seatNo}"]`
    );

    if(selectedSeats.includes(seatNo)){

        selectedSeats =
        selectedSeats.filter(
            s => s !== seatNo
        );

        btn.classList.remove(
            "selected"
        );

        btn.classList.add(
            "available"
        );
    }
    else{

        selectedSeats.push(seatNo);

        btn.classList.remove(
            "available"
        );

        btn.classList.add(
            "selected"
        );
    }

    updateSummary();
}

function bookSeats(){

    let name =
    document.getElementById(
        "passengerName"
    ).value;

    if(name===""){
        alert(
            "Enter passenger name"
        );
        return;
    }

    if(selectedSeats.length===0){
        alert(
            "Select at least one seat"
        );
        return;
    }

    for(let seatNo of selectedSeats){

        seats[seatNo-1].status =
        "Booked";

        seats[seatNo-1].passenger =
        name;

        const btn =
        document.querySelector(
            `[data-seat="${seatNo}"]`
        );

        btn.classList.remove(
            "selected"
        );

        btn.classList.add(
            "booked"
        );

        bookingHistory.push(
            `${name} booked Seat ${seatNo}`
        );
    }

    document.getElementById(
        "history"
    ).innerHTML =
    bookingHistory
    .map(item =>
        `<li>${item}</li>`
    )
    .join("");

    let total =
    selectedSeats.length *
    PRICE_PER_SEAT;

    alert(
        "Booking Successful\n\n" +
        "Passenger: " + name +
        "\nSeats: " +
        selectedSeats.join(", ") +
        "\nAmount: Rs." +
        total
    );

    selectedSeats = [];

    document.getElementById(
        "passengerName"
    ).value = "";

    updateSummary();
}

function cancelBooking(){

    let seatNo =
    Number(
        prompt(
            "Enter seat number to cancel"
        )
    );

    if(
        seatNo < 1 ||
        seatNo > TOTAL_SEATS
    ){
        alert("Invalid Seat");
        return;
    }

    let seat =
    seats[seatNo-1];

    if(
        seat.status !== "Booked"
    ){
        alert("Seat not booked");
        return;
    }

    seat.status = "Available";
    seat.passenger = "";

    const btn =
    document.querySelector(
        `[data-seat="${seatNo}"]`
    );

    btn.className =
    "seat available";

    bookingHistory.push(
        `Seat ${seatNo} cancelled`
    );

    document.getElementById(
        "history"
    ).innerHTML =
    bookingHistory
    .map(item =>
        `<li>${item}</li>`
    )
    .join("");

    updateSummary();

    alert(
        "Booking Cancelled"
    );
}

function updateSummary(){

    let booked =
    seats.filter(
        s => s.status==="Booked"
    ).length;

    let available =
    TOTAL_SEATS - booked;

    document.getElementById(
        "availableCount"
    ).innerText =
    "Available Seats: " +
    available;

    document.getElementById(
        "bookedCount"
    ).innerText =
    "Booked Seats: " +
    booked;

    document.getElementById(
        "amount"
    ).innerText =
    "Selected Amount: Rs." +
    (
        selectedSeats.length *
        PRICE_PER_SEAT
    );
}

updateSummary();

</script>

</body>
</html>
